# TEST-ONLY SIMPLE BASELINE for MAPPO training.
# This configuration is only used to verify that the cooperative MAPPO pipeline can
# run end-to-end under simplified assumptions.
# Simplified assumptions in this baseline:
# - 3 friendly UAVs vs 3 key enemy UAVs and 3 non-key enemy UAVs
# - no key-target association
# - actor uses full ground-truth observations
# - critic uses full global ground-truth state
# These settings are NOT the final project setup and should later be replaced by
# association + noisy global observation + local observation correction.

scenario:
  # Number of key enemy UAVs that define the real jamming objective.
  key_enemy_count: 3

  # Number of non-key enemy UAVs kept in the scene as clutter.
  # They are generated with the same scene initialization rules as ground_truth.py.
  nonkey_enemy_count: 3

  # Number of friendly UAV agents controlled by MAPPO.
  friendly_uav_count: 3

baseline_assumptions:
  # This section documents the temporary assumptions of the simple test version.
  # It is meant for readability and future replacement, not for algorithm logic.

  # TEST-ONLY SIMPLE BASELINE:
  # Keep this true so the training environment uses the same scene generation path as
  # src/simulation/ground_truth.py via SwarmEnv.reset() -> initialize_scene().
  use_ground_truth_scene_rules: true

  # No key-target association module is used in this baseline.
  no_association: true

  # Actor directly receives ground-truth observations instead of noisy observations.
  use_ground_truth_actor_obs: true

  # Critic directly receives the full global ground-truth state.
  use_ground_truth_critic_state: true

  # Key enemies are kept first in the enemy ordering because initialize_scene() creates
  # key nodes before non-key nodes. This ordering is a TEST-ONLY shortcut for the simple baseline.
  key_enemies_come_first_in_enemy_list: true

training:
  # Total number of policy updates.
  num_updates: 2000

  # Batch size counts flattened agent-time samples used in one PPO update.
  # In the current single-environment implementation:
  #   batch_size = rollout_length * num_agents
  # If batch_size is set, rollout_length will be derived automatically from it.
  batch_size: 192

  # Number of environment steps collected before each PPO update.
  # Kept here for readability and backward compatibility. If batch_size is set,
  # MAPPO will internally recompute rollout_length = batch_size / num_agents.
  rollout_length: 64

  # Number of PPO optimization epochs per update.
  ppo_epochs: 4

  # Number of samples per mini-batch during PPO updates.
  # minibatch_size is the chunk used inside one epoch, and should be <= batch_size.
  minibatch_size: 32

  # Discount factor for future rewards.
  gamma: 0.99

  # Lambda used by Generalized Advantage Estimation (GAE).
  gae_lambda: 0.95

  # PPO clipping ratio. Smaller values make the policy update more conservative.
  clip_ratio: 0.2  # 旧的 0.08

  # Coefficient of the critic value loss.
  value_loss_coef: 0.5

  # Coefficient of the entropy bonus.
  entropy_coef: 0.01 # 旧的 0.03

  # Whether to normalize value targets with running mean/std.
  # The critic predicts normalized values and MAPPO denormalizes them for rollout/GAE.
  use_value_normalization: true

  # Small numerical stabilizer for ValueNorm running statistics.
  value_norm_epsilon: 1.0e-4

  # Maximum gradient norm for gradient clipping.
  max_grad_norm: 0.5

  # Shared learning rate for the simple baseline actor and critic.
  learning_rate: 3.0e-4

  # Random seed for reproducible training runs.
  seed: 42

network:
  # Hidden layer width used by the shared actor network.
  actor_hidden_dim: 128

  # Hidden layer width used by the centralized critic network.
  critic_hidden_dim: 128

  # Number of fully connected hidden layers in the actor network.
  actor_num_layers: 2

  # Number of fully connected hidden layers in the critic network.
  critic_num_layers: 2

  # Activation function used in MLPs.
  activation: relu

marl:
  # Number of friendly agents controlled by MAPPO.
  num_agents: 3

  # Whether all agents share one actor policy.
  share_policy: true

  # Whether the critic uses centralized global state information.
  use_centralized_critic: true

  # Future hook: allow the critic to concatenate global state with flattened local observations.
  # Keep false for the current truth-state debug baseline. Later this can be turned on after
  # noisy/global-local observation models are completed.
  use_critic_local_observations: false

logging:
  # How often to print training statistics, measured in policy updates.
  log_interval: 10

  # How often to save model checkpoints, measured in policy updates.
  checkpoint_interval: 50

  # How often to run evaluation, measured in policy updates.
  eval_interval: 50

  # Directory used to save checkpoints.
  checkpoint_dir: outputs/checkpoints

  # Directory used to save training logs and curves.
  log_dir: outputs/logs
