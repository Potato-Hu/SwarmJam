enemy_mobility:
  # Enemy motion model used to update target trajectories each simulation step.
  model: gauss_markov
  # Size of the 3D map in meters: [x_max, y_max, z_max].
  bounds: [200.0, 200.0, 60.0]
  # Minimum distance kept from the map boundary when clipping positions.
  # This avoids agents being updated exactly onto the edge of the valid region.
  safety_margin: 1.0
  vmax:
    # Maximum speed of enemy nodes in meters per second.
    enemy: 5.0
    # Maximum speed of friendly UAVs in meters per second.
    friendly: 6.0

  gauss_markov:
    # Memory factor of the Gauss-Markov process.
    # Larger values make motion smoother and more correlated with the previous direction.
    alpha: 0.9
    # Time interval in seconds between heading updates.
    # Larger values make target heading changes less frequent.
    direction_update_interval: 2.0
    # Standard deviation of horizontal direction noise.
    # Larger values produce more random turning in the x-y plane.
    direction_noise_std: 0.5
    # Standard deviation of vertical pitch noise.
    # Larger values produce stronger climb/dive fluctuations.
    pitch_noise_std: 0.2

  random_walk:
    travel_duration: 4.0
    pitch_limit: 1.0471975512

simulation:
  # Physical simulation time interval in seconds for one environment step.
  # This belongs to the environment dynamics rather than the MAPPO algorithm config.
  dt: 0.5

  # Number of environment steps per rollout or episode.
  num_steps: 40
  # Whether to print the initial positions of all entities when a simulation starts.
  # Disabled by default for MAPPO debugging so rollout logs stay readable.
  print_initial_positions: false
  # Whether to print positions at every time step during simulation.
  # Enabling this is useful for debugging but can produce verbose logs.
  print_timestep_positions: false

reward:
  # Reward mode used by SwarmEnv during MAPPO training.
  # - difference: original per-agent difference reward based only on marginal
  #   key-target jamming utility and ally safety.
  # - sustained_tracking: dynamic key assignment with log received power,
  #   distance progress, movement cost, and ally safety.
  reward_mode: sustained_tracking
  # reward_mode: difference
  # Safety threshold for interference received by each friendly UAV.
  tau_ally: 10.0
  # Weight of the ally safety penalty term in both reward modes.
  lambda_safety: 0.2
  # Positive logarithmic scaling constant used in log(1 + J / J0).
  J0: 1.0e-8
  # Weight for log received power at the currently assigned key target.
  power_weight: 1.0
  # Weight for becoming closer to the assigned key target compared with last step.
  progress_weight: 0.4
  # Distance scale in meters used to normalize one-step distance progress.
  progress_distance_scale: 4.0
  # Small cost for every non-stop friendly action.
  move_penalty_weight: 0.1
